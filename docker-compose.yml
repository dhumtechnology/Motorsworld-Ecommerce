services:
  node:
    image: node:22-alpine
    container_name: motosworld_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    networks:
      - motosworld
    command: sh docker/node/build-assets.sh
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: motosworld_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/vendor
      - app_blade_cache:/var/www/html/storage/framework/views
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - app_file_cache:/var/www/html/storage/framework/cache
    networks:
      - motosworld
    depends_on:
      mysql:
        condition: service_healthy
      node:
        condition: service_completed_successfully
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-motosworld}
      - DB_USERNAME=${DB_USERNAME:-motosworld}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - TMPDIR=/var/www/html/storage/framework/cache
      - SEED_ON_START=${SEED_ON_START:-true}

  nginx:
    image: nginx:alpine
    container_name: motosworld_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - motosworld
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: motosworld_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-motosworld}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-motosworld}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - motosworld
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  motosworld:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  node_modules:
    driver: local
  app_vendor:
    driver: local
  app_blade_cache:
    driver: local
  app_bootstrap_cache:
    driver: local
  app_file_cache:
    driver: local
